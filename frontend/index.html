<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce Dashboard</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      color: #222;
    }

    header {
      background: linear-gradient(135deg, #0f172a, #1e40af);
      color: white;
      padding: 35px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 38px;
    }

    header p {
      margin-top: 10px;
      font-size: 17px;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: 30px auto;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card, .panel {
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.10);
      padding: 25px;
    }

    .stat-card {
      text-align: center;
    }

    .stat-card h3 {
      color: #1e40af;
      margin: 0;
    }

    .stat-card p {
      font-size: 26px;
      font-weight: bold;
      margin: 10px 0 0;
    }

    h2 {
      border-left: 6px solid #1e40af;
      padding-left: 12px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    button {
      background: #1e40af;
      color: white;
      border: none;
      padding: 13px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    .success { background: #16a34a; }
    .danger { background: #dc2626; }

    input {
      padding: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      min-width: 250px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    #resultado {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }

    .producto {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 22px;
      border-radius: 16px;
      box-shadow: 0 5px 14px rgba(0,0,0,0.06);
    }

    .producto h3 {
      color: #1e40af;
      margin-top: 0;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
    }

    .stock-ok {
      background: #dcfce7;
      color: #166534;
    }

    .stock-low {
      background: #fee2e2;
      color: #991b1b;
    }

    footer {
      text-align: center;
      padding: 25px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <h1>🛒 E-Commerce Dashboard</h1>
  <p>API REST desarrollada en Go | Sistema de gestión para tienda tecnológica</p>
</header>

<div class="container">

  <section class="stats">
    <div class="stat-card">
      <h3>📦 Productos</h3>
      <p id="stat-total">--</p>
    </div>

    <div class="stat-card">
      <h3>⚠️ Stock Bajo</h3>
      <p id="stat-stock">--</p>
    </div>

    <div class="stat-card">
      <h3>💰 Producto Caro</h3>
      <p id="stat-caro">--</p>
    </div>
  </section>

  <section class="panel">
    <h2>Panel de administración</h2>

    <div class="buttons">
      <button onclick="verProductos()">👁 Ver productos</button>
      <button onclick="productoUno()">⭐ Producto principal</button>
      <button onclick="contarProductos()">📊 Contar productos</button>
      <button onclick="productoCaro()">💰 Más caro</button>
      <button onclick="stockBajo()">⚠️ Stock bajo</button>
      <button onclick="productosConStock()">✅ Con stock</button>
    </div>

    <div class="search-box">
      <input type="text" id="buscar" placeholder="Buscar producto, ejemplo: Laptop">
      <button onclick="buscarProducto()">🔍 Buscar</button>
    </div>

    <div class="buttons">
      <button class="success" onclick="agregarProducto()">➕ Agregar producto</button>
      <button onclick="actualizarProducto()">✏️ Actualizar producto</button>
      <button class="danger" onclick="eliminarProducto()">🗑 Eliminar producto</button>
    </div>
  </section>

  <section class="panel">
    <h2>Resultados</h2>
    <div id="resultado"></div>
  </section>

</div>

<footer>
  Proyecto desarrollado por Paul Guamo | Go + API REST + JSON + GitHub
</footer>

<script>
  const API = "http://localhost:8080";

  function tarjetaProducto(p) {
    let claseStock = p.Stock <= 10 ? "stock-low" : "stock-ok";
    let textoStock = p.Stock <= 10 ? "Stock bajo" : "Disponible";

    return `
      <div class="producto">
        <h3>${p.Name}</h3>
        <p><strong>ID:</strong> ${p.ID}</p>
        <p><strong>Descripción:</strong> ${p.Description}</p>
        <p><strong>Precio:</strong> $${p.Price}</p>
        <p><strong>Stock:</strong>
          <span class="badge ${claseStock}">
            ${textoStock} (${p.Stock})
          </span>
        </p>
      </div>
    `;
  }

  function mostrar(data) {
    const resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    if (Array.isArray(data)) {
      if (data.length === 0) {
        resultado.innerHTML = `<div class="producto"><h3>No hay resultados</h3></div>`;
        return;
      }

      data.forEach(p => {
        resultado.innerHTML += tarjetaProducto(p);
      });

    } else if (data.total !== undefined) {
      resultado.innerHTML = `
        <div class="producto">
          <h3>Total de productos</h3>
          <p><strong>Total registrado:</strong> ${data.total}</p>
        </div>
      `;

    } else if (data.Name !== undefined) {
      resultado.innerHTML = tarjetaProducto(data);

    } else {
      resultado.innerHTML = `
        <div class="producto">
          <h3>Operación realizada</h3>
          <p>${data}</p>
        </div>
      `;
    }
  }

  function verProductos() {
    fetch(API + "/products")
      .then(res => res.json())
      .then(data => mostrar(data));
  }

  function productoUno() {
    fetch(API + "/products/one")
      .then(res => res.json())
      .then(data => mostrar(data));
  }

  function contarProductos() {
    fetch(API + "/products/count")
      .then(res => res.json())
      .then(data => {
        document.getElementById("stat-total").innerText = data.total;
        mostrar(data);
      });
  }

  function productoCaro() {
    fetch(API + "/products/expensive")
      .then(res => res.json())
      .then(data => {
        document.getElementById("stat-caro").innerText = data.Name;
        mostrar(data);
      });
  }

  function stockBajo() {
    fetch(API + "/products/low-stock")
      .then(res => res.json())
      .then(data => {
        document.getElementById("stat-stock").innerText = data.length;
        mostrar(data);
      });
  }

  function productosConStock() {
    fetch(API + "/products/stock")
      .then(res => res.json())
      .then(data => mostrar(data));
  }

  function buscarProducto() {
    const nombre = document.getElementById("buscar").value;

    fetch(API + "/products/search?name=" + nombre)
      .then(res => res.json())
      .then(data => mostrar(data));
  }

  function agregarProducto() {
    fetch(API + "/products/add", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        ID: 3,
        Name: "Teclado Gamer",
        Description: "Teclado mecánico RGB",
        Price: 75.50,
        Stock: 20
      })
    })
    .then(res => res.json())
    .then(data => {
      contarProductos();
      productoCaro();
      stockBajo();
      mostrar(data);
    });
  }

  function actualizarProducto() {
    fetch(API + "/products/update", {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        ID: 2,
        Name: "Mouse Gamer",
        Description: "Mouse Logitech RGB actualizado",
        Price: 39.99,
        Stock: 25
      })
    })
    .then(res => res.json())
    .then(data => {
      contarProductos();
      productoCaro();
      stockBajo();
      mostrar(data);
    });
  }

  function eliminarProducto() {
    fetch(API + "/products/delete", {
      method: "DELETE"
    })
    .then(res => res.text())
    .then(data => {
      contarProductos();
      productoCaro();
      stockBajo();

      document.getElementById("resultado").innerHTML = `
        <div class="producto">
          <h3>Operación realizada</h3>
          <p>${data}</p>
        </div>
      `;
    });
  }

  window.onload = function() {
    contarProductos();
    productoCaro();
    stockBajo();
  };
</script>

</body>
</html>
